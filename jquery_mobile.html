<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <title>jQuery Mobile Website</title>

  <!-- jQuery Mobile CSS -->
  <link rel="stylesheet"
  href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

  <!-- jQuery Mobile JS -->
  <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

</head>

<body>

<!-- Home Page -->
<div data-role="page" id="home">

  <!-- Header -->
  <div data-role="header" data-theme="b">
    <h1>My Mobile Website</h1>
  </div>

  <!-- Main Content -->
  <div role="main" class="ui-content">

    <h2>Welcome</h2>

    <p>This is a simple mobile website using jQuery Mobile.</p>

    <a href="#about"
       class="ui-btn ui-btn-b ui-corner-all">
       About Page
    </a>

  </div>

  <!-- Footer -->
  <div data-role="footer" data-theme="b">
    <h4>© 2026 Mobile Site</h4>
  </div>

</div>

<!-- About Page -->
<div data-role="page" id="about">

  <!-- Header -->
  <div data-role="header" data-theme="b">

    <a href="#home"
       data-icon="back">
       Back
    </a>

    <h1>About</h1>

  </div>

  <!-- Content -->
  <div role="main" class="ui-content">

    <h2>About This Website</h2>

    <p>
      This website is designed for mobile devices
      using jQuery Mobile.
    </p>

  </div>

  <!-- Footer -->
  <div data-role="footer" data-theme="b">
    <h4>Thank You</h4>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registered Users</title>

  <style>

    body{
      font-family: Arial;
      background:#f2f2f2;
    }

    .container{
      width:80%;
      margin:40px auto;
      background:white;
      padding:20px;
      border-radius:10px;
    }

    table{
      width:100%;
      border-collapse: collapse;
    }

    th, td{
      border:1px solid gray;
      padding:10px;
      text-align:center;
    }

    th{
      background:blue;
      color:white;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>Registered Users</h2>

  <table>

    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Password</th>
      </tr>
    </thead>

    <tbody id="tableBody">

    </tbody>

  </table>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];

let tableBody = document.getElementById("tableBody");

users.forEach(function(user){

    let row = `
      <tr>
        <td>${user.name}</td>
        <td>${user.email}</td>
        <td>${user.password}</td>
      </tr>
    `;

    tableBody.innerHTML += row;

});

</script>

</body>
</html>
